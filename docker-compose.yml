services:
  graphrag:
    image: ghcr.io/anteneht-t-tessema/graphrag:main
    ports:
      - "7860:7860"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
